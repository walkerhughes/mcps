schema_version = "1.1"

[task]
name = "harbor-mcp/check-published-task"
description = "Use the harbor-hub MCP server to check whether a task package exists on the hub and report its content hash."
authors = []
keywords = ["mcp", "harbor-hub", "eval"]

[metadata]
category = "mcp"
difficulty = "easy"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0

# Resolved from the HOST environment when the verifier runs (empty when unset).
# EVAL_EXPECTED_PUBLISHED (yes|no) and EVAL_EXPECTED_CONTENT_HASH optionally
# provide ground truth for an exact check; without them the verifier can only
# validate the answer format (see tests/test.sh).
[verifier.env]
EVAL_TASK_REF = "${EVAL_TASK_REF:-}"
EVAL_EXPECTED_PUBLISHED = "${EVAL_EXPECTED_PUBLISHED:-}"
EVAL_EXPECTED_CONTENT_HASH = "${EVAL_EXPECTED_CONTENT_HASH:-}"

[environment]
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0

# stdio transport: the server runs inside the main container, so this works on
# both docker and modal (unlike the compose-sidecar pattern, which is
# docker-only). The `harbor-mcp` command resolves because environment/Dockerfile
# installs this repo. HARBOR_API_KEY reaches the server through the agent's
# process environment (`harbor run --ae HARBOR_API_KEY=...`).
[[environment.mcp_servers]]
name = "harbor-hub"
transport = "stdio"
command = "harbor-mcp"
args = []

[solution.env]
