schema_version = "1.1"

[task]
name = "harbor-mcp/fetch-job-results"
description = "Use the harbor-hub MCP server to report a job's mean reward."
authors = []
keywords = ["mcp", "harbor-hub", "eval"]

[metadata]
category = "mcp"
difficulty = "easy"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0

# Resolved from the HOST environment when the verifier runs (empty when unset).
# EVAL_EXPECTED_MEAN_REWARD optionally provides ground truth for an exact
# numeric check; without it the verifier can only validate the answer format
# (see tests/test.sh).
[verifier.env]
EVAL_JOB_ID = "${EVAL_JOB_ID:-}"
EVAL_EXPECTED_MEAN_REWARD = "${EVAL_EXPECTED_MEAN_REWARD:-}"

[environment]
build_timeout_sec = 900.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0

# stdio transport: the server runs inside the main container, so this works on
# both docker and modal (unlike the compose-sidecar pattern, which is
# docker-only). The `harbor-mcp` command resolves because environment/Dockerfile
# installs this repo. HARBOR_API_KEY reaches the server through the agent's
# process environment (`harbor run --ae HARBOR_API_KEY=...`).
[[environment.mcp_servers]]
name = "harbor-hub"
transport = "stdio"
command = "harbor-mcp"
args = []

[solution.env]
