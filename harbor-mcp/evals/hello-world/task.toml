version = "1.0"

# A trivial, deterministic hello-world task -- the same idea as Harbor's
# maintained hello-world/hello-world, but on a python base so it runs on modal
# (see environment/Dockerfile). Two callers run it with the oracle agent:
#   - evals/run_evals.sh + run_eval_safety.sh, to mint a fresh hub job for the
#     job-based evals (read-job, delete-job).
#   - tests/e2e/test_hub_roundtrip.py, as the fixture it uploads/deletes.
[task]
name = "harbor-mcp/hello-world"
authors = []
keywords = ["hello-world", "fixture"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 1024
storage_mb = 5120
gpus = 0
mcp_servers = []
